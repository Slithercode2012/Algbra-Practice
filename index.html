<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Standard Calculator</title>
    <style>
        body {
            background-color: #0f172a;
            color: #ffffff;
            font-family: system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .calc-box {
            background-color: #1e293b;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            width: 300px;
        }
        .display {
            background-color: #0f172a;
            padding: 15px;
            border-radius: 10px;
            font-size: 2rem;
            text-align: right;
            margin-bottom: 20px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            min-height: 40px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }
        button {
            background-color: #334155;
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.25rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.1s;
        }
        button:hover { background-color: #475569; }
        button.operator { background-color: #f97316; }
        button.operator:hover { background-color: #ea580c; }
        button.clear { background-color: #ef4444; }
        button.clear:hover { background-color: #dc2626; }
    </style>
</head>
<body>

    <div class="calc-box">
        <div class="display" id="screen">0</div>
        <div class="grid">
            <button class="clear" onclick="clearScreen()">C</button>
            <button onclick="press('/')">/</button>
            <button onclick="press('*')">*</button>
            <button onclick="press('-')">-</button>

            <button onclick="press('7')">7</button>
            <button onclick="press('8')">8</button>
            <button onclick="press('9')">9</button>
            <button class="operator" onclick="press('+')">+</button>

            <button onclick="press('4')">4</button>
            <button onclick="press('5')">5</button>
            <button onclick="press('6')">6</button>
            <button class="operator" onclick="calculate()">=</button>

            <button onclick="press('1')">1</button>
            <button onclick="press('2')">2</button>
            <button onclick="press('3')">3</button>
            <button onclick="press('0')">0</button>
        </div>
    </div>

    <script>
        let currentInput = "";

        function press(num) {
            if (currentInput === "0") {
                currentInput = num;
            } else {
                currentInput += num;
            }
            updateScreen();
            
            // SECRET CODE CHECK: If someone types 0000, redirect to your game dashboard!
            if (currentInput === "0000") {
                window.location.href = "dashboard.html";
            }
        }

        function clearScreen() {
            currentInput = "0";
            updateScreen();
        }

        function updateScreen() {
            document.getElementById('screen').innerText = currentInput || "0";
        }

        function calculate() {
            try {
                currentInput = eval(currentInput).toString();
            } catch (error) {
                currentInput = "Error";
            }
            updateScreen();
        }
    </script>
</body>
</html>
