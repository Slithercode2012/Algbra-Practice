<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Standard Calculator</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --screen-bg: #090d16;
            --btn-normal: #334155;
            --btn-hover: #475569;
            --btn-operator: #f97316;
            --btn-operator-hover: #ea580c;
            --btn-clear: #ef4444;
            --btn-clear-hover: #dc2626;
            --text: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Calculator Body Framework */
        .calc-box {
            background-color: var(--surface);
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), border-color 0.2s;
            width: 100%;
            max-width: 320px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Responsive Display Panel */
        .display {
            background-color: var(--screen-bg);
            color: #4ade80; /* Clean green digital font look */
            padding: 20px;
            border-radius: 14px;
            font-size: 2.25rem;
            text-align: right;
            margin-bottom: 24px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            border: 1px solid rgba(255, 255, 255, 0.02);
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.5);
        }

        /* Grid Framework for Buttons */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
        }

        button {
            background-color: var(--btn-normal);
            color: var(--text);
            border: none;
            padding: 18px 0;
            font-size: 1.4rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            user-select: none;
            transition: background-color 0.1s ease, transform 0.05s ease;
        }

        button:hover {
            background-color: var(--btn-hover);
        }

        button:active {
            transform: scale(0.95);
        }

        button.operator {
            background-color: var(--btn-operator);
        }
        button.operator:hover {
            background-color: var(--btn-operator-hover);
        }

        button.clear {
            background-color: var(--btn-clear);
        }
        button.clear:hover {
            background-color: var(--btn-clear-hover);
        }
    </style>
</head>
<body>

    <div class="calc-box">
        <div class="display" id="screen">0</div>
        
        <div class="grid">
            <button class="clear" onclick="clearScreen()">C</button>
            <button onclick="press('/')">/</button>
            <button onclick="press('*')">*</button>
            <button onclick="press('-')">-</button>

            <button onclick="press('7')">7</button>
            <button onclick="press('8')">8</button>
            <button onclick="press('9')">9</button>
            <button class="operator" onclick="press('+')">+</button>

            <button onclick="press('4')">4</button>
            <button onclick="press('5')">5</button>
            <button onclick="press('6')">6</button>
            <button class="operator" onclick="calculate()">=</button>

            <button onclick="press('1')">1</button>
            <button onclick="press('2')">2</button>
            <button onclick="press('3')">3</button>
            <button onclick="press('0')">0</button>
        </div>
    </div>

    <script>
        let currentInput = "";
        let keyHistory = ""; // Securely tracks background raw string stream input

        function press(num) {
            // 1. Core Calculator Logic Setup
            if (currentInput === "0") {
                currentInput = num;
            } else {
                currentInput += num;
            }
            updateScreen();
            
            // 2. Continuous 4-Character Vault Buffer Validation
            keyHistory += num;
            if (keyHistory.length > 4) {
                keyHistory = keyHistory.slice(-4); // Strictly capture trailing sequence window
            }
            
            // 3. Authorization Routing Hook Trigger
            if (keyHistory === "0000") {
                window.location.href = "dashboard.html";
            }
        }

        function clearScreen() {
            currentInput = "0";
            keyHistory = ""; // Flush authorization memory matrix
            updateScreen();
        }

        function updateScreen() {
            document.getElementById('screen').innerText = currentInput || "0";
        }

        function calculate() {
            try {
                // Safeguard calculation evaluate process block
                if (currentInput !== "") {
                    currentInput = eval(currentInput).toString();
                }
            } catch (error) {
                currentInput = "Error";
            }
            updateScreen();
        }
    </script>
</body>
</html>
